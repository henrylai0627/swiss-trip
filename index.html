.card{background:var(--card); border-radius:16px; box-shadow:var(--shadow); padding:14px; margin-bottom:12px}

.hotel{display:flex; gap:10px; align-items:center}
.hotel .ic{font-size:22px}
.hotel .nm{font-weight:700; font-size:15px}
.hotel .loc{color:var(--sub); font-size:13px}
.tl{position:relative; padding-left:2px}
.ti{display:flex; gap:10px; padding:7px 0; border-bottom:1px solid var(--line); align-items:flex-start}
.ti:last-child{border-bottom:none}
.ti .t{flex:0 0 86px; font-weight:700; font-size:13px; color:var(--red-dark); font-variant-numeric:tabular-nums; padding-top:1px}
.ti .x{flex:1; font-size:14px; line-height:1.45}
.ti .x small{display:block; color:var(--sub); font-size:12px; margin-top:2px}
a.mlink{text-decoration:none; font-size:12px; margin-left:4px; vertical-align:baseline; white-space:nowrap}
.ti.hl .x{font-weight:600}
.linkrow{display:flex; flex-wrap:wrap; gap:8px}
a.btn{display:inline-flex; align-items:center; gap:6px; text-decoration:none; font-size:13px; font-weight:600; padding:9px 12px; border-radius:12px; color:#fff; line-height:1.2}
a.btn.cam{background:var(--cam)}
a.btn.ticket{background:var(--ticket)}
a.btn.info{background:var(--info)}
a.btn.map{background:#374151}
.meals{display:grid; gap:8px}
.meal{display:flex; gap:8px; font-size:14px; align-items:flex-start}
.meal .k{flex:0 0 26px; font-size:16px}
.meal .v b{display:block; font-size:12px; color:var(--meal); font-weight:700}
.note{background:#fffbeb; border:1px solid #fde68a; border-radius:12px; padding:10px 12px; font-size:13px; line-height:1.5; margin-top:10px}
.note b{color:#92400e}
.cost li{font-size:13.5px; padding:3px 0}
.cost ul{margin:0; padding-left:18px}
.tips{font-size:13.5px; line-height:1.6; color:#374151}
.tips p{margin:6px 0}
ul.clean{margin:0; padding-left:18px; font-size:14px; line-height:1.7}
.chk{display:flex; align-items:flex-start; gap:10px; padding:9px 0; border-bottom:1px solid var(--line); font-size:14px; line-height:1.45}
.chk:last-child{border-bottom:none}
.chk input{width:20px; height:20px; accent-color:var(--meal); flex:0 0 auto; margin-top:1px}
.chk.done label{text-decoration:line-through; color:var(--sub)}
.chk a{color:var(--cam)}
.spot h4{margin:12px 0 4px; font-size:14.5px}
.spot p{margin:0; font-size:13.5px; color:#374151; line-height:1.6}
footer{text-align:center; color:var(--sub); font-size:12px; padding:20px}
.section{display:none}
.section.active{display:block}
@media (prefers-color-scheme: dark){

  .tips, .spot p{color:#c7cad1}
  .badge.bday{background:#3f1d31}
  .badge.flight{background:#12303f}
}

const $ = s => document.querySelector(s);
const tabsEl = $("#tabs"), mainEl = $("#main");

function esc(s){return s||""}

function renderDay(d){
  let h = `<section class="section" id="${d.id}">`;
  h += `<div class="dayhead"><h2>${d.title}</h2><div class="route">${d.route}</div>`;
  if(d.badge) h += `<span class="badge ${d.badge.c}">${d.badge.t}</span>`;
  h += `</div>`;
  if(d.hotel) h += `<div class="card"><div class="hotel"><div class="ic">${d.hotel.ic}</div><div><div class="nm">${d.hotel.nm}${pin(d.hotel.m)}</div><div class="loc">${d.hotel.loc}</div></div></div></div>`;
  if(d.links && d.links.length){
    h += `<div class="card"><h3>🔗 快速連結 (Live Cam / 訂票)</h3><div class="linkrow">`;
    d.links.forEach(L=>{ h += `<a class="btn ${L.c}" href="${L.u}" target="_blank" rel="noopener">${L.l}</a>`; });
    h += `</div></div>`;
  }
  if(d.tl && d.tl.length){
    h += `<div class="card"><h3>🕐 行程時間表</h3><div class="tl">`;
    d.tl.forEach(i=>{
      h += `<div class="ti${i.hl?" hl":""}"><div class="t">${esc(i.t)}</div><div class="x">${i.x}${pin(i.m)}${i.s?`<small>${i.s}</small>`:""}</div></div>`;
    });
    h += `</div></div>`;
  }
  if(d.meals && d.meals.length){
    h += `<div class="card"><h3>🍽 餐飲安排</h3><div class="meals">`;
    d.meals.forEach(m=>{ h += `<div class="meal"><div class="k">${m.k}</div><div class="v"><b>${m.b}</b>${m.v}${pin(m.m)}</div></div>`; });
    h += `</div></div>`;
  }
  if(d.costs && d.costs.length){
    h += `<div class="card cost"><h3>💰 費用</h3><ul>`;
    d.costs.forEach(c=>{ h += `<li>${c}</li>`; });
    h += `</ul></div>`;
  }
  if(d.tips && d.tips.length){
    h += `<div class="note"><b>📌 貼士</b><br>` + d.tips.join("<br>") + `</div>`;
  }
  h += `</section>`;
  return h;
}

function renderTasks(){
  let h = `<section class="section" id="tasks"><div class="dayhead"><h2>✅ 待辦清單</h2><div class="route">買飛 / 預訂 checklist(勾選會自動儲存)</div></div><div class="card">`;
  TASKS.forEach(t=>{
    const link = t.u ? ` <a href="${t.u}" target="_blank" rel="noopener">🔗 ${t.ul}</a>` : "";
    h += `<div class="chk" data-id="${t.id}"><input type="checkbox" id="${t.id}"><label for="${t.id}">${t.x}${link}</label></div>`;
  });
  h += `</div>`;
  h += `<div class="note"><b>💡 SBB App 買飛貼士</b><br>喺 SBB App 買火車票時,喺乘客設定 (Passenger) 入面將折扣選項剔選 <b>「Half-Fare travelcard 1/2」</b>,系統就會自動半價結算。</div>`;
  h += `<div class="dayhead" style="margin-top:18px"><h2>📍 備用景點參考</h2></div><div class="card spot">`;
  BACKUP.forEach(b=>{ h += `<h4>${b.h}</h4><p>${b.p}</p>`; });
  h += `<p style="margin-top:12px"><a href="https://stellaclife.com/switzerland-travel-guide/" target="_blank" rel="noopener" style="color:var(--cam)">📖 瑞士自由行總攻略 (stellaclife)</a></p>`;
  h += `</div></section>`;
  return h;
}

// build
let tabsHtml = "";
DAYS.forEach(d=>{ tabsHtml += `<button class="tab" data-target="${d.id}"><span>${d.chip.w}</span><b>${d.chip.d}</b></button>`; });
tabsHtml += `<button class="tab tasks-tab" data-target="tasks"><span>清單</span><b>✅</b></button>`;
tabsEl.innerHTML = tabsHtml;
mainEl.innerHTML = DAYS.map(renderDay).join("") + renderTasks();

function show(id){
  document.querySelectorAll(".section").forEach(s=>s.classList.toggle("active", s.id===id));
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active", t.dataset.target===id));
  const tab = document.querySelector(`.tab[data-target="${id}"]`);
  if(tab) tab.scrollIntoView({inline:"center", behavior:"smooth", block:"nearest"});
  window.scrollTo({top:0});
  localStorage.setItem("lastDay", id);
}
tabsEl.addEventListener("click", e=>{
  const b = e.target.closest(".tab"); if(b) show(b.dataset.target);
});

// checklist persistence
const saved = JSON.parse(localStorage.getItem("tasks")||"{}");
document.querySelectorAll(".chk input").forEach(cb=>{
  cb.checked = !!saved[cb.id];
  cb.closest(".chk").classList.toggle("done", cb.checked);
  cb.addEventListener("change", ()=>{
    saved[cb.id] = cb.checked;
    localStorage.setItem("tasks", JSON.stringify(saved));
    cb.closest(".chk").classList.toggle("done", cb.checked);
  });
});

// default day: today if within trip, else first day / last viewed
(function(){
  const today = new Date().toISOString().slice(0,10);
  const match = DAYS.find(d=>d.date===today);
  if(match){ show(match.id); return; }
  const last = localStorage.getItem("lastDay");
  if(last && document.getElementById(last)){ show(last); return; }
  show(DAYS[0].id);
})();

// offline support
if("serviceWorker" in navigator && location.protocol.startsWith("http")){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
</script>
