<title>✈️ BB &amp; BBQ Trips</title>
<meta name="theme-color" content="#d52b1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">

<style>
:root{
  --red:#d52b1e; --red-dark:#b02318;
  --bg:#f4f5f7; --card:#ffffff; --text:#1c1c1e; --sub:#6b7280;
  --line:#e5e7eb; --cam:#0ea5e9; --ticket:#f59e0b; --info:#8b5cf6;
  --meal:#16a34a; --shadow:0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.05);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
body{margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif; background:var(--bg); color:var(--text); padding-bottom:env(safe-area-inset-bottom)}
header{position:sticky; top:0; z-index:50; background:var(--red); color:#fff; padding-top:env(safe-area-inset-top); box-shadow:0 2px 8px rgba(0,0,0,.25)}
.htitle{display:flex; align-items:center; justify-content:space-between; padding:10px 14px 6px}
.htitle h1{font-size:17px; margin:0; font-weight:700}
.htitle .sub{font-size:11px; opacity:.85}
#tabs{display:flex; overflow-x:auto; gap:6px; padding:4px 12px 10px; scrollbar-width:none}
#tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto; background:rgba(255,255,255,.16); color:#fff; border:none; border-radius:12px; padding:6px 10px; font-size:12px; line-height:1.25; text-align:center; cursor:pointer; min-width:52px}
.tab b{display:block; font-size:14px}
.tab.active{background:#fff; color:var(--red); font-weight:700}
.tab.tasks-tab.active{color:#b45309}
main{max-width:640px; margin:0 auto; padding:12px 12px calc(78px + env(safe-area-inset-bottom))}
.dayhead{padding:4px 4px 10px}
.dayhead h2{margin:0; font-size:21px}
.dayhead .route{color:var(--sub); font-size:14px; margin-top:3px}
.badge{display:inline-block; font-size:11px; font-weight:700; padding:2px 8px; border-radius:999px; margin-top:6px}
.badge.bday{background:#fde7f3; color:#db2777}
.badge.flight{background:#e0f2fe; color:#0369a1}
.card{background:var(--card); border-radius:16px; box-shadow:var(--shadow); padding:14px; margin-bottom:12px}
.card h3{margin:0 0 10px; font-size:14px; color:var(--sub); text-transform:uppercase; letter-spacing:.4px; display:flex; align-items:center; gap:6px}
.hotel{display:flex; gap:10px; align-items:center}
.hotel .ic{font-size:22px}
.hotel .nm{font-weight:700; font-size:15px}
.hotel .loc{color:var(--sub); font-size:13px}
.tl{position:relative; padding-left:2px}
.ti{display:flex; gap:10px; padding:7px 0; border-bottom:1px solid var(--line); align-items:flex-start}
.ti:last-child{border-bottom:none}
.ti .t{flex:0 0 86px; font-weight:700; font-size:13px; color:var(--red-dark); font-variant-numeric:tabular-nums; padding-top:1px}
.ti .x{flex:1; font-size:14px; line-height:1.45}
.ti .x small{display:block; color:var(--sub); font-size:12px; margin-top:2px}
a.mlink{text-decoration:none; font-size:12px; margin-left:4px; vertical-align:baseline; white-space:nowrap}
.ti.hl .x{font-weight:600}
.ti.now{background:#fff1f0; border-radius:10px; padding:7px 8px; margin:0 -8px; border-bottom-color:transparent; box-shadow:inset 3px 0 0 var(--red)}
.ti.now .t::before{content:""; display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--red); margin-right:5px; animation:nowpulse 1.6s ease-in-out infinite}
@keyframes nowpulse{0%,100%{opacity:1; transform:scale(1)} 50%{opacity:.35; transform:scale(.75)}}
#nextbar{display:none; background:var(--red-dark); color:#fff; font-size:12.5px; padding:7px 14px 9px; cursor:pointer; line-height:1.35}
#nextbar b{font-size:13.5px}
.wx{font-size:12.5px; color:var(--sub); margin-top:6px}
.wxsum{display:flex; align-items:center; gap:9px; font-size:13.5px; color:var(--text)}
.wxsum .bige{font-size:26px; line-height:1}
.wxsum small{color:var(--sub)}
.wxh{display:flex; gap:5px; overflow-x:auto; margin-top:7px; padding-bottom:2px; scrollbar-width:none}
.wxh::-webkit-scrollbar{display:none}
.wxchip{flex:0 0 auto; text-align:center; font-size:10.5px; color:var(--sub); background:var(--card); border:1px solid var(--line); border-radius:10px; padding:5px 8px; line-height:1.5; box-shadow:var(--shadow)}
.wxchip .e{font-size:15px; display:block}
.wxchip b{display:block; font-size:12.5px; color:var(--text)}
.wxchip .pp{color:#0ea5e9}
#tripmap{height:64vh; border-radius:16px; box-shadow:var(--shadow); background:var(--card)}
.emomark{font-size:25px; line-height:1; text-shadow:0 1px 3px rgba(0,0,0,.45); filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}
.maplegend{display:flex; flex-wrap:wrap; gap:10px; font-size:12.5px; color:var(--sub); padding:8px 4px}
.leaflet-popup-content{font-size:13px; line-height:1.5}
.leaflet-popup-content a{color:var(--cam)}
.att{display:flex; gap:6px; align-items:center; margin-top:7px}
.att .ref{flex:1; min-width:0}
input.inf, .exp-form input, .exp-form select{border:1px solid var(--line); border-radius:9px; padding:7px 9px; font-size:13px; background:var(--bg); color:var(--text); font-family:inherit}
input.inf{width:100%; margin-top:5px}
.attbtn{background:none; border:1px dashed var(--sub); border-radius:9px; padding:6px 9px; font-size:13px; color:var(--sub); cursor:pointer}
.thumb{width:42px; height:42px; object-fit:cover; border-radius:8px; border:1px solid var(--line); vertical-align:middle; cursor:pointer}
.rmatt, .expdel{background:none; border:none; color:var(--sub); font-size:14px; padding:4px 6px; cursor:pointer}
#qrmodal{position:fixed; inset:0; background:rgba(0,0,0,.88); display:none; align-items:center; justify-content:center; z-index:99}
#qrmodal img{max-width:92vw; max-height:82vh; border-radius:12px; background:#fff}
.exp-form{display:flex; gap:6px; margin-top:2px}
.addbtn{background:var(--red); color:#fff; border:none; border-radius:9px; padding:8px 16px; font-weight:700; font-size:14px; cursor:pointer}
.exp-row{display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid var(--line); font-size:14px}
.exp-row:last-child{border-bottom:none}
.exp-rates{font-size:12.5px; color:var(--sub); margin-top:10px}
.exp-rates input{width:60px; border:1px solid var(--line); border-radius:7px; padding:4px 6px; background:var(--bg); color:var(--text)}
.frow{padding:9px 0; border-bottom:1px solid var(--line); font-size:14px; line-height:1.5}
.frow:last-child{border-bottom:none}
.frow small{color:var(--sub)}
.frow a.tel{color:var(--cam); text-decoration:none; font-weight:600}
#exp-total{font-size:14px}
.linkrow{display:flex; flex-wrap:wrap; gap:8px}
a.btn{display:inline-flex; align-items:center; gap:6px; text-decoration:none; font-size:13px; font-weight:600; padding:9px 12px; border-radius:12px; color:#fff; line-height:1.2}
a.btn.cam{background:var(--cam)}
a.btn.ticket{background:var(--ticket)}
a.btn.info{background:var(--info)}
a.btn.map{background:#374151}
.meals{display:grid; gap:8px}
.meal{display:flex; gap:8px; font-size:14px; align-items:flex-start}
.meal .k{flex:0 0 26px; font-size:16px}
.meal .v b{display:block; font-size:12px; color:var(--meal); font-weight:700}
.note{background:#fffbeb; border:1px solid #fde68a; border-radius:12px; padding:10px 12px; font-size:13px; line-height:1.5; margin-top:10px}
.note b{color:#92400e}
.cost li{font-size:13.5px; padding:3px 0}
.cost ul{margin:0; padding-left:18px}
.tips{font-size:13.5px; line-height:1.6; color:#374151}
.tips p{margin:6px 0}
ul.clean{margin:0; padding-left:18px; font-size:14px; line-height:1.7}
.chk{display:flex; align-items:flex-start; gap:10px; padding:9px 0; border-bottom:1px solid var(--line); font-size:14px; line-height:1.45}
.chk:last-child{border-bottom:none}
.chk input{width:20px; height:20px; accent-color:var(--meal); flex:0 0 auto; margin-top:1px}
.chk.done label{text-decoration:line-through; color:var(--sub)}
.chk a{color:var(--cam)}
.spot h4{margin:12px 0 4px; font-size:14.5px}
.spot p{margin:0; font-size:13.5px; color:#374151; line-height:1.6}
footer{text-align:center; color:var(--sub); font-size:12px; padding:20px}
.section{display:none}
.section.active{display:block}
/* ---- bottom nav (mobile 主分類) ---- */
#botnav{position:fixed; left:0; right:0; bottom:0; z-index:60; display:flex; max-width:640px; margin:0 auto; background:var(--card); border-top:1px solid var(--line); padding-bottom:env(safe-area-inset-bottom); box-shadow:0 -2px 12px rgba(0,0,0,.08)}
#botnav button{flex:1; background:none; border:none; color:var(--sub); font-size:10.5px; padding:7px 2px 6px; display:flex; flex-direction:column; align-items:center; gap:3px; cursor:pointer; line-height:1.1; -webkit-tap-highlight-color:transparent}
#botnav button .bi{font-size:21px; line-height:1; transition:transform .12s}
#botnav button.active{color:var(--red); font-weight:700}
#botnav button.active .bi{transform:translateY(-1px) scale(1.08)}
/* ---- edit mode ---- */
#editmode-btn{background:rgba(255,255,255,.16); border:none; color:#fff; border-radius:10px; font-size:14px; padding:5px 10px; cursor:pointer; margin-left:8px}
#editmode-btn.on{background:#fff}
.ebtn{background:var(--bg); border:1px solid var(--line); border-radius:7px; font-size:12px; padding:3px 7px; cursor:pointer; color:var(--text); line-height:1.3; flex:0 0 auto}
.ebtns{display:flex; flex-direction:column; gap:3px; flex:0 0 auto}
.card h3 .h3add{margin-left:auto}
.adddaybtn{display:block; width:100%; border:2px dashed var(--sub); background:none; color:var(--sub); border-radius:14px; padding:12px; font-size:14px; cursor:pointer; margin:4px 0 12px}
#editsheet{position:fixed; inset:0; background:rgba(0,0,0,.45); display:none; align-items:flex-end; z-index:95}
#editsheet.open{display:flex}
#editsheet .sheet{background:var(--card); width:100%; max-width:640px; margin:0 auto; border-radius:18px 18px 0 0; padding:16px 16px calc(18px + env(safe-area-inset-bottom)); max-height:84vh; overflow-y:auto; box-shadow:0 -6px 30px rgba(0,0,0,.3)}
.sheet h3{margin:0 0 12px; font-size:16px}
.field{margin-bottom:10px}
.field label{display:block; font-size:12px; color:var(--sub); margin-bottom:3px}
.field input[type=text], .field textarea, .field select{width:100%; border:1px solid var(--line); border-radius:9px; padding:8px 10px; font-size:14px; background:var(--bg); color:var(--text); font-family:inherit}
.field textarea{resize:vertical}
.field.fchk label{display:flex; align-items:center; gap:8px; font-size:14px; color:var(--text)}
.field.fchk input{width:19px; height:19px; accent-color:var(--red)}
.sheet-btns{display:flex; gap:8px; margin-top:14px; flex-wrap:wrap}
.sheet-btns .addbtn.gray{background:var(--sub)}
.sheet-btns .addbtn.danger{background:#dc2626}
/* ---- homepage (trip list) ---- */
#back-btn{background:rgba(255,255,255,.16); border:none; color:#fff; border-radius:10px; font-size:15px; padding:5px 10px; cursor:pointer; margin-right:8px; flex:0 0 auto}
.tripcard{display:flex; align-items:center; gap:12px; background:var(--card); border-radius:16px; box-shadow:var(--shadow); padding:16px 14px; margin-bottom:12px; cursor:pointer}
.tripcard .em{font-size:30px; flex:0 0 auto}
.tripcard .nm{font-weight:700; font-size:16px}
.tripcard .sub{color:var(--sub); font-size:13px; margin-top:2px}
.tripcard .chev{margin-left:auto; color:var(--sub); display:flex; gap:8px; align-items:center; font-size:20px; flex:0 0 auto}
.homebtns{display:flex; gap:8px; margin-top:4px}
.homebtns .addbtn{flex:1}
.homebtns .addbtn.gray{background:var(--sub)}
@media (prefers-color-scheme: dark){
  :root{--bg:#101114; --card:#1c1d22; --text:#f2f2f5; --sub:#9ca3af; --line:#2e2f36; --shadow:0 1px 3px rgba(0,0,0,.4)}
  .note{background:#2a2310; border-color:#5b4a14}
  .note b{color:#fbbf24}
  .tips, .spot p{color:#c7cad1}
  .badge.bday{background:#3f1d31}
  .badge.flight{background:#12303f}
  .ti.now{background:#33201d}
}
</style>
</head>

  <footer>BB &amp; BBQ ❤️</footer>

// ---- multi-trip state ----
// 每個旅程 = 一個 Firestore 房號;BUILTIN_* / TAIPEI_* 係內置 trip 第一次開嘅種子資料
const DEFAULT_ROOM = "bbhenry-swiss26-kq84z";
let curRoom = null, curTrip = null;
let DAYS = [], TASKSDEF = [], FLIGHTS = [], HOTELS = [], BACKUP = [], FILES = [], PLACES = [];
let saved = {}, INF = {}, EXPS = [], RATES = {};
let editMode = false;

// 本機 cache 按旅程房號分開
const lsKey = k => curRoom + ":" + k;
function lsGet(k, def){
  try{
    const v = JSON.parse(localStorage.getItem(lsKey(k)));
    return v === null || v === undefined ? def : v;
  }catch(e){ return def; }
}
function lsSet(k, v){ try{ localStorage.setItem(lsKey(k), JSON.stringify(v)); }catch(e){} }

// 一次性搬遷:舊版(單一旅程)嘅本機資料 → 瑞士 trip 嘅 namespace
(function(){
  if(localStorage.getItem("migr1")) return;
  ["days2","tasks","inf","exps","rates"].forEach(k=>{
    const v = localStorage.getItem(k);
    if(v !== null && localStorage.getItem(DEFAULT_ROOM+":"+k) === null) localStorage.setItem(DEFAULT_ROOM+":"+k, v);

function bindDocSync(){
  const b = document.getElementById("docsync-btn"); if(!b) return;
  const st = document.getElementById("docsync-status");
  b.addEventListener("click", async ()=>{
    b.disabled = true; const old = b.textContent; b.textContent = "⏳ 同步緊…";
    st.textContent = "讀緊 Google Doc + 比較改動…";
    try{
      const headers = {"content-type":"application/json"};
      if(DOC_SYNC.token) headers["x-sync-token"] = DOC_SYNC.token;
      const r = await fetch(DOC_SYNC.url, {method:"POST", headers});
      const j = await r.json();
      if(!r.ok) throw new Error(j.error || ("HTTP "+r.status));
      const tag = j.status==="updated" ? "✅ " : (j.status==="nochange" ? "👍 " : "ℹ️ ");
      st.textContent = tag + (j.message||"完成") + (j.changedDays && j.changedDays.length ? ` (${j.changedDays.join(", ")})` : "");
    }catch(e){ st.textContent = "❌ "+e.message; }
    finally{ b.disabled = false; b.textContent = old; }
  });
}

// destination local time: returns {date:"YYYY-MM-DD", min: minutes since midnight}
function nowIn(tz){
  try{
    const parts = new Intl.DateTimeFormat("en-CA",{timeZone:tz, year:"numeric", month:"2-digit", day:"2-digit", hour:"2-digit", minute:"2-digit", hourCycle:"h23"}).formatToParts(new Date());
    const g = t => parts.find(p=>p.type===t).value;
    return {date:`${g("year")}-${g("month")}-${g("day")}`, min: (+g("hour"))*60 + (+g("minute"))};
  }catch(e){
    const d = new Date();
    return {date:d.toISOString().slice(0,10), min:d.getHours()*60+d.getMinutes()};
  }
}

// highlight the timeline item happening right now (destination local time)
function updateNow(){
  document.querySelectorAll(".ti.now").forEach(el=>el.classList.remove("now"));
  DAYS.forEach(d=>{
    if(!d.tl || !d.tl.length) return;
    const n = nowIn(d.tz||"Europe/Zurich");
    if(n.date !== d.date) return;
    const rows = document.querySelectorAll(`#${d.id} .ti`);
    const starts = d.tl.map(i=>{
      const m = (i.t||"").match(/(\d{1,2}):(\d{2})/);
      return m ? (+m[1])*60 + (+m[2]) : null;
    });
    // current = last timed item that has already started
    let cur = -1;
    for(let i=0;i<starts.length;i++){
      if(starts[i]===null) continue;
      if(starts[i] <= n.min) cur = i; else break;
    }
    if(cur < 0) return;
    // if that item's own range has ended and untimed items follow, move on to them
    const tm = (d.tl[cur].t||"").match(/(\d{1,2}):(\d{2})\D+(\d{1,2}):(\d{2})/);
    const end = tm ? (+tm[3])*60 + (+tm[4]) : null;
    const marks = [cur];
    if(end!==null && end <= n.min){
      const follow = [];
      for(let i=cur+1; i<starts.length && starts[i]===null; i++) follow.push(i);
      if(follow.length){ marks.length = 0; marks.push(...follow); }
    }
    marks.forEach(i=>{ if(rows[i]) rows[i].classList.add("now"); });
  });
  updateNextBar();
}

const fmtMin = m => m<60 ? `${m} 分鐘` : `${Math.floor(m/60)} 小時${m%60 ? " "+(m%60)+" 分" : ""}`;

// countdown bar: next upcoming timed item today (destination local time)
function updateNextBar(){
  const bar = document.querySelector("#nextbar");
  if(!bar) return;
  let nx = null;
  for(const d of DAYS){
    if(!d.tl || !d.tl.length) continue;
    const n = nowIn(d.tz||"Europe/Zurich");
    if(n.date !== d.date) continue;
    for(let i=0;i<d.tl.length;i++){
      const m = (d.tl[i].t||"").match(/(\d{1,2}):(\d{2})/);
      if(!m) continue;
      const st = (+m[1])*60 + (+m[2]);
      if(st > n.min){
        const txt = d.tl[i].x.replace(/<[^>]*>/g,"");
        nx = {id:d.id, idx:i, mins:st-n.min, hh:m[0], txt: txt.length>32 ? txt.slice(0,32)+"…" : txt};
        break;
      }
    }
    if(nx) break;
  }
  if(nx){
    bar.innerHTML = `⏰ <b>${fmtMin(nx.mins)}</b>後 · ${nx.hh} ${nx.txt}`;
    bar.dataset.day = nx.id; bar.dataset.idx = nx.idx;
    bar.style.display = "block";
  }else{
    bar.style.display = "none";
  }
}

// ---- weather (Open-Meteo, free, no key; cached 3hr in localStorage) ----
const WXEMO = c => c===0?"☀️" : c<=2?"🌤️" : c===3?"☁️" : c<=48?"🌫️" : c<=57?"🌦️" : c<=67?"🌧️" : c<=77?"🌨️" : c<=82?"🌧️" : c<=86?"🌨️" : "⛈️";
const WXTXT = c => c===0?"天晴" : c<=2?"大致天晴" : c===3?"多雲" : c<=48?"有霧" : c<=57?"毛毛雨" : c<=67?"有雨" : c<=77?"落雪" : c<=82?"驟雨" : c<=86?"雪驟" : "雷暴";
function daysUntil(ds){
  const t = new Date(); t.setHours(0,0,0,0);
  return Math.round((new Date(ds+"T00:00:00") - t) / 86400000);
}
async function loadWeather(){
  const room = curRoom;
  if(!room) return;
  for(const d of DAYS){
    if(curRoom !== room) return; // 中途轉咗 trip → 停
    if(!d.wx) continue;
    const el = document.getElementById("wx-"+d.id);
    if(!el) continue;
    const ck = room+":wx2-"+d.date;
    let cached = null;
    try{ cached = JSON.parse(localStorage.getItem(ck)||"null"); }catch(e){}
    if(cached) el.innerHTML = cached.h;
    if(cached && Date.now()-cached.t < 3*3600*1000) continue;
    // 預報期以外(Open-Meteo 出 ~16日)→ 顯示倒數提示,唔使白行 API
    const du = daysUntil(d.date);
    if(du > 15){
      el.innerHTML = `<div class="wxsum"><span class="bige">📅</span><div>${d.wx.name} 天氣預報<br><small>出發前 16 日內會自動出現(仲有 ${du} 日)</small></div></div>`;
      continue;
    }
    try{
      const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${d.wx.lat}&longitude=${d.wx.lon}&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&hourly=temperature_2m,weather_code,precipitation_probability&timezone=auto&start_date=${d.date}&end_date=${d.date}`);
      const j = await r.json();
      if(!j.daily || j.daily.weather_code == null || j.daily.weather_code[0] == null) continue;
      const code = j.daily.weather_code[0];
      const pp = j.daily.precipitation_probability_max ? j.daily.precipitation_probability_max[0] : null;
      let h = `<div class="wxsum"><span class="bige">${WXEMO(code)}</span><div><b>${d.wx.name} ${Math.round(j.daily.temperature_2m_max[0])}° / ${Math.round(j.daily.temperature_2m_min[0])}°</b>${pp!=null ? ` · ☔️ ${pp}%` : ""}<br><small>${WXTXT(code)}</small></div></div>`;
      if(j.hourly && j.hourly.time && j.hourly.temperature_2m){
        let chips = "";
        [8,10,12,14,16,18,20,22].forEach(hr=>{
          const i = j.hourly.time.findIndex(t=>t.endsWith(`T${String(hr).padStart(2,"0")}:00`));
          if(i < 0 || j.hourly.temperature_2m[i] == null) return;
          const hp = j.hourly.precipitation_probability ? j.hourly.precipitation_probability[i] : null;
          chips += `<div class="wxchip">${String(hr).padStart(2,"0")}:00<span class="e">${WXEMO(j.hourly.weather_code[i])}</span><b>${Math.round(j.hourly.temperature_2m[i])}°</b>${hp!=null && hp>=20 ? `<span class="pp">☔️${hp}%</span>` : ""}</div>`;
        });
        if(chips) h += `<div class="wxh">${chips}</div>`;
      }
      el.innerHTML = h;
      try{ localStorage.setItem(ck, JSON.stringify({t:Date.now(), h})); }catch(e){}
    }catch(e){ /* offline → 唔顯示 / keep 舊 cache */ }
  }
}

// ---- 全程地圖 (Leaflet + OpenStreetMap;座標用 GEO_BAKED,冇嘅就 Nominatim geocode + cache) ----
let lmap = null;
function destroyMap(){ if(lmap){ try{ lmap.remove(); }catch(e){} lmap = null; } }
const KEMO = {hotel:"🏨", spot:"📍", meal:"🍜", shop:"🛍️"};

function renderMapSec(){

    <div id="tripmap"></div>

function collectPins(){
  const out = [], seen = {};
  const add = (n,q,k,day)=>{
    if(!q || seen[q]) return;
    seen[q] = 1;
    out.push({n:String(n).replace(/<[^>]*>/g,""), q, k, day:day||""});
  };
  DAYS.forEach(d=>{
    const dl = d.chip ? d.chip.d : "";
    if(d.hotel && d.hotel.m) add(d.hotel.nm, d.hotel.m, "hotel", dl);
    (d.tl||[]).forEach(i=>add(i.x, i.m, "spot", dl));
    (d.meals||[]).forEach(m2=>add(m2.v||m2.b, m2.m, "meal", dl));
  });
  (PLACES||[]).forEach(p=>add(p.n, p.q||p.n, p.k||"spot", p.day));
  return out;
}

async function geocode(q){
  if(GEO_BAKED[q]) return GEO_BAKED[q];
  let c = null;
  try{ c = JSON.parse(localStorage.getItem("geo:"+q)||"null"); }catch(e){}
  if(c === "x") return null;        // 之前搵過冇結果
  if(Array.isArray(c)) return c;
  try{
    const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(q)}`);
    const j = await r.json();
    await new Promise(res=>setTimeout(res, 1100)); // Nominatim 限 1 req/s
    if(j && j[0]){
      const ll = [+j[0].lat, +j[0].lon];
      try{ localStorage.setItem("geo:"+q, JSON.stringify(ll)); }catch(e){}
      return ll;
    }
    try{ localStorage.setItem("geo:"+q, '"x"'); }catch(e){}
  }catch(e){ /* offline → 下次再試 */ }
  return null;
}

async function initMap(){
  const st = $("#map-status");
  if(!window.L){ if(st) st.textContent = "⚠️ 載入唔到地圖 library — 有網絡時 refresh 一次"; return; }
  if(lmap){ lmap.invalidateSize(); return; }
  const room = curRoom;
  lmap = L.map("tripmap");
  L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {maxZoom:19, attribution:"© OpenStreetMap"}).addTo(lmap);
  L.control.scale({imperial:false}).addTo(lmap);
  const pins = collectPins();
  if(!pins.length){
    lmap.setView([25.05, 121.53], 11);
    if(st) st.textContent = "未有地點 — 行程項目有 📍(Google Maps 搜尋字串)就會自動出現喺地圖";
    return;
  }
  const pts = [];
  let miss = 0;
  for(let i = 0; i < pins.length; i++){
    const p = pins[i];
    if(st && i % 3 === 0) st.textContent = `📍 搵緊位置… ${i+1}/${pins.length}`;
    const ll = await geocode(p.q);
    if(curRoom !== room || !lmap) return; // 中途轉咗 trip
    if(!ll){ miss++; continue; }
    L.marker(ll, {icon: L.divIcon({className:"", html:`<div class="emomark">${KEMO[p.k]||"📍"}</div>`, iconSize:[26,26], iconAnchor:[13,22]})})
      .addTo(lmap)
      .bindPopup(`<b>${escT(p.n)}</b>${p.day ? ` <small style="color:#6b7280">(${escT(p.day)})</small>` : ""}<br><a href="${gm(p.q)}" target="_blank" rel="noopener">喺 Google Maps 開 ↗</a>`);
    pts.push(ll);
    lmap.fitBounds(pts, {padding:[36,36], maxZoom:15});
  }
  if(st) st.textContent = `📍 ${pts.length} 個地點` + (miss ? ` · ${miss} 個搵唔到座標(行程入面嘅 📍 連結照用得)` : "");
}

// ---- trip files (旅程準備文件 — 切件存 Firestore,兩部機同步) ----
const docfile = $("#docfile");
const FILE_CHUNK = 700000; // base64 字元數,每件 <1MB Firestore doc 上限
const FILE_MAX = 8*1024*1024;

const fmtSize = b => b >= 1048576 ? (b/1048576).toFixed(1)+" MB" : Math.max(1, Math.round(b/1024))+" KB";
const fileIcon = t => /pdf/.test(t) ? "📄" : /^image\//.test(t) ? "🖼" : "📎";

function setDocStatus(html){
  const el = document.getElementById("doc-status");
  if(el) el.innerHTML = html;
}

function renderFiles(){
  const el = document.getElementById("file-list");
  if(!el) return;
  el.innerHTML = FILES.length
    ? FILES.map(f=>`<div class="frow" style="display:flex; align-items:center; gap:8px"><div style="flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap">${fileIcon(f.type)} ${escT(f.name)} <small style="color:var(--sub)">(${fmtSize(f.size||0)})</small></div><button class="ebtn" data-fopen="${f.id}">開</button><button class="rmatt" data-fdel="${f.id}" title="刪除">✕</button></div>`).join("")
    : `<div style="color:var(--sub); font-size:13px">未有文件 — 可以將成個 trip 準備 doc 放呢度</div>`;
}

function uploadTripFile(file){
  if(!file) return;
  if(!db || !curRoom){ alert("離線/連接唔到雲端,暫時上載唔到 — 有網絡時再試"); return; }
  if(file.size > FILE_MAX){ alert("檔案太大(上限 8MB)— 試下壓細啲先"); return; }
  const room = curRoom;
  const fid = "f" + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  setDocStatus(`⏳ 上載緊 ${escT(file.name)}…(離線會等有網先上到)`);
  const rd = new FileReader();
  rd.onload = ()=>{
    const data = String(rd.result);
    const b64 = data.slice(data.indexOf(",")+1);
    const n = Math.max(1, Math.ceil(b64.length/FILE_CHUNK));
    const fref = db.collection("trips").doc(room).collection("files").doc(fid);
    let pr = Promise.resolve();
    for(let i=0;i<n;i++){
      const part = b64.slice(i*FILE_CHUNK, (i+1)*FILE_CHUNK);
      pr = pr.then(()=>fref.collection("chunks").doc(String(i).padStart(3,"0")).set({p:part}));
    }
    pr.then(()=>fref.set({name:file.name, type:file.type||"application/octet-stream", size:file.size, n, t:Date.now()}))
      .then(()=>setDocStatus("✅ 上載完成"))
      .catch(e=>setDocStatus("⚠️ 上載失敗:"+escT(e.code||e.message||e)));
  };
  rd.onerror = ()=>setDocStatus("⚠️ 讀唔到個檔案");
  rd.readAsDataURL(file);
}

function openTripFile(fid){
  const f = FILES.find(x=>x.id===fid);
  if(!f || !db || !curRoom) return;
  setDocStatus(`⏳ 開緊 ${escT(f.name)}…`);
  db.collection("trips").doc(curRoom).collection("files").doc(fid).collection("chunks").get().then(s=>{
    if(s.size < (f.n||1)){ setDocStatus("⚠️ 檔案仲同步緊(或者上載未完成)— 遲啲再試"); return; }
    const b64 = s.docs.slice().sort((a,b)=> a.id < b.id ? -1 : 1).map(d=>d.data().p).join("");
    const bin = atob(b64);
    const arr = new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) arr[i] = bin.charCodeAt(i);
    const url = URL.createObjectURL(new Blob([arr], {type:f.type}));
    setDocStatus("");
    const w = window.open(url, "_blank");
    if(!w){
      const a = document.createElement("a");
      a.href = url; a.download = f.name;
      document.body.appendChild(a); a.click(); a.remove();
    }
  }).catch(e=>setDocStatus("⚠️ 開唔到:"+escT(e.code||e.message||e)));
}

function delTripFile(fid){
  if(!db || !curRoom) return;
  const fref = db.collection("trips").doc(curRoom).collection("files").doc(fid);
  fref.collection("chunks").get().then(s=>{
    s.docs.forEach(d=>d.ref.delete().catch(()=>{}));
    fref.delete().catch(()=>{});
  }).catch(()=>{});
}

const escT = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;");
function refreshExp(){
  const list = $("#exp-list"), tot = $("#exp-total");
  list.innerHTML = EXPS.length
    ? EXPS.map((x,i)=>`<div class="exp-row"><div style="flex:1"><b>${x.c} ${(+x.a).toFixed(1)}</b>${x.n?` ${escT(x.n)}`:""}<small style="color:var(--sub)"> · ${x.d}</small></div><button class="expdel" data-i="${i}">✕</button></div>`).join("")
    : `<div style="color:var(--sub); font-size:13px">未有記錄</div>`;
  const sums = {};
  EXPS.forEach(x=>{ sums[x.c] = (sums[x.c]||0) + (+x.a||0); });
  const hkd = Object.keys(sums).reduce((s,c)=> s + sums[c]*(c==="HKD" ? 1 : (RATES[c]||0)), 0);
  tot.innerHTML = EXPS.length
    ? Object.keys(sums).map(c=>`${c} ${sums[c].toFixed(1)}`).join(" + ") + ` ≈ <b>HKD ${hkd.toFixed(0)}</b>`
    : "—";
}
function bindExpenses(){
  $("#exp-add").addEventListener("click", ()=>{
    const a = parseFloat($("#exp-a").value);
    if(!a){ $("#exp-a").focus(); return; }
    const dt = new Date();
    EXPS.push({a, c:$("#exp-c").value, n:$("#exp-n").value.trim(), d:`${dt.getDate()}/${dt.getMonth()+1} ${String(dt.getHours()).padStart(2,"0")}:${String(dt.getMinutes()).padStart(2,"0")}`});
    lsSet("exps", EXPS);
    $("#exp-a").value = ""; $("#exp-n").value = "";
    refreshExp();
    pushSync({exps:EXPS});
  });
  $("#exp-list").addEventListener("click", e=>{
    const b = e.target.closest(".expdel");
    if(b && confirm("刪除呢筆?")){ EXPS.splice(+b.dataset.i, 1); lsSet("exps", EXPS); refreshExp(); pushSync({exps:EXPS}); }
  });
  $("#exp-csv").addEventListener("click", ()=>{
    if(!EXPS.length){ alert("未有記錄,冇嘢好 export 住~"); return; }
    const q = v => /[",\n]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v;
    const toHKD = x => x.c==="HKD" ? (+x.a||0) : (+x.a||0)*(RATES[x.c]||0);
    const rows = [["日期","貨幣","金額","項目","≈HKD"]];
    EXPS.forEach(x=>{ rows.push([x.d||"", x.c, (+x.a).toFixed(2), x.n||"", toHKD(x) ? toHKD(x).toFixed(1) : ""]); });
    rows.push(["","","","總計", EXPS.reduce((s,x)=>s+toHKD(x), 0).toFixed(1)]);
    const csv = "\uFEFF" + rows.map(r=>r.map(v=>q(String(v))).join(",")).join("\r\n");
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([csv], {type:"text/csv;charset=utf-8"}));
    a.download = ((curTrip && curTrip.name ? curTrip.name : "trip").replace(/[\\\/:*?"<>|]/g,"").trim() || "trip") + " 使費.csv";
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
  });
  curCfg().curs.forEach(c=>{
    const inp = $("#rate-"+c);
    inp.value = RATES[c];
    inp.addEventListener("input", ()=>{
      RATES[c] = parseFloat(inp.value)||0;
      lsSet("rates", RATES);
      refreshExp();
      clearTimeout(infTimers["rate"+c]);
      infTimers["rate"+c] = setTimeout(()=>pushSync({rates:RATES}), 800);
    });
  });
  refreshExp();
}

function openSheet(title, fields, opts){
  opts = opts || {};
  let h = `<h3>${title}</h3>`;
  fields.forEach(f=>{
    if(f.type === "check"){
      h += `<div class="field fchk"><label><input type="checkbox" data-k="${f.k}"${f.v?" checked":""}> ${f.label}</label></div>`;
    }else if(f.type === "select"){
      h += `<div class="field"><label>${f.label}</label><select data-k="${f.k}">${f.opts.map(o=>`<option value="${escA(o.v)}"${o.v===f.v?" selected":""}>${o.l}</option>`).join("")}</select></div>`;
    }else if(f.type === "textarea"){
      h += `<div class="field"><label>${f.label}</label><textarea data-k="${f.k}" rows="${f.rows||2}" placeholder="${escA(f.ph||"")}">${escA(f.v)}</textarea></div>`;
    }else if(f.type === "file"){
      h += `<div class="field"><label>${f.label}</label><input type="file" data-k="${f.k}"></div>`;
    }else{
      h += `<div class="field"><label>${f.label}</label><input type="text" data-k="${f.k}" value="${escA(f.v)}" placeholder="${escA(f.ph||"")}"></div>`;
    }
  });
  h += `<div class="sheet-btns"><button class="addbtn" data-sh="save" style="flex:1">💾 儲存</button>`;
  (opts.extra||[]).forEach((x,i)=>{ h += `<button class="addbtn gray" data-sh="x${i}">${x.l}</button>`; });
  if(opts.onDelete) h += `<button class="addbtn danger" data-sh="del">🗑</button>`;
  h += `<button class="addbtn gray" data-sh="cancel">取消</button></div>`;
  sheetBody.innerHTML = h;
  editsheet.classList.add("open");
  sheetBody.onclick = e=>{
    const b = e.target.closest("[data-sh]");
    if(!b) return;
    const a = b.dataset.sh;
    if(a === "cancel"){ closeSheet(); return; }
    if(a === "del"){ if(confirm("確定刪除?")){ closeSheet(); opts.onDelete(); } return; }
    if(a[0] === "x"){ closeSheet(); opts.extra[+a.slice(1)].fn(); return; }
    const v = {};
    sheetBody.querySelectorAll("[data-k]").forEach(el=>{
      v[el.dataset.k] = el.type==="checkbox" ? el.checked : el.type==="file" ? (el.files && el.files[0]) : el.value.trim();
    });
    closeSheet();
    opts.onSave(v);
  };
}

      ],
    });
    return;
  }

  if(act === "day-add"){
    openSheet("➕ 新增一日", [
      {k:"date", label:"日期 (YYYY-MM-DD)", v:"", ph:"2026-07-06"},
      {k:"title", label:"標題", v:"", ph:"7月6日 (一) …"},
      {k:"route", label:"路線 / 副題", v:""},
    ], {
      onSave: v=>{
        if(!/^\d{4}-\d{2}-\d{2}$/.test(v.date)){ alert("日期格式要係 YYYY-MM-DD"); return; }
        let id = "d" + v.date.slice(5).replace("-","");
        while(DAYS.some(x=>x.id===id) || ["tasks","exps","infos"].includes(id)) id += "x";
        const nd = {id, date:v.date, tz:d.tz||"Europe/Zurich", chip:chipFromDate(v.date), title:v.title||v.date, route:v.route||"", tl:[], meals:[], costs:[], tips:[], links:[]};
        DAYS.splice(DAYS.indexOf(d)+1, 0, nd);
        commitDays();
        show(id);
      },
    });
    return;
  }
});

// 成個行程上 Firestore(mergeFields = 完整取代 days/dayOrder 兩個欄位,刪咗嘅日先會真係消失)
function pushDays(){
  if(!roomRef) return;
  const days = {};
  DAYS.forEach(dd=>{ days[dd.id] = JSON.parse(JSON.stringify(dd)); });
  roomRef.set({days, dayOrder: DAYS.map(dd=>dd.id)}, {mergeFields:["days","dayOrder"]}).catch(()=>{});

function applyRemote(data){
  if(data.days && data.dayOrder && data.dayOrder.length){
    const arr = data.dayOrder.map(id=>data.days[id]).filter(Boolean);
    if(arr.length && JSON.stringify(arr) !== JSON.stringify(DAYS)){
      DAYS = arr;
      lsSet("days2", DAYS);
      rebuildDays();
    }
  }
  // checklist 定義 / 航班 / 酒店 / 備用景點(另一部機改咗 → 重新渲染)
  let staticDirty = false;
  [["tasksDef","tasksdef"],["flights","flights"],["hotels","hotels"],["backup","backup"]].forEach(pair=>{
    const remote = data[pair[0]];
    if(!remote) return;
    const local = pair[0]==="tasksDef" ? TASKSDEF : pair[0]==="flights" ? FLIGHTS : pair[0]==="hotels" ? HOTELS : BACKUP;
    if(JSON.stringify(remote) !== JSON.stringify(local)){
      if(pair[0]==="tasksDef") TASKSDEF = remote;
      else if(pair[0]==="flights") FLIGHTS = remote;
      else if(pair[0]==="hotels") HOTELS = remote;
      else BACKUP = remote;
      lsSet(pair[1], remote);
      staticDirty = true;
    }
  });
  if(staticDirty) renderTrip(true);
  if(data.tasks){
    Object.assign(saved, data.tasks);
    lsSet("tasks", saved);
    document.querySelectorAll(".chk input[type=checkbox]").forEach(cb=>{
      cb.checked = !!saved[cb.id];
      cb.closest(".chk").classList.toggle("done", cb.checked);
    });
  }
  if(data.inf){
    Object.assign(INF, data.inf);
    lsSet("inf", INF);
    document.querySelectorAll("input.inf").forEach(inp=>{
      if(document.activeElement !== inp) inp.value = INF[inp.dataset.k]||"";
    });
  }
  if(data.exps){
    EXPS = data.exps;
    lsSet("exps", EXPS);
    refreshExp();
  }
  if(data.rates){
    Object.assign(RATES, data.rates);
    lsSet("rates", RATES);
    curCfg().curs.forEach(c=>{
      const inp = document.getElementById("rate-"+c);
      if(inp && document.activeElement !== inp) inp.value = RATES[c];
    });
    refreshExp();
  }
}

function initFirebase(){

      if(seedTpePending && !L.some(t=>t.room===TAIPEI_ROOM)){

// 入咗一個旅程之後先開佢嘅房 — 雙向同步
function startTripSync(){
  unsubTrip();
  if(!db){ setSyncStatus("⚠️ 載入唔到 Firebase(可能離線)— 有網絡時 refresh 一次"); return; }
  const room = curRoom;
  roomRef = db.collection("trips").doc(room);
  attCol = roomRef.collection("atts");
  // 初次加入:房未存在 → 上載本機資料;已存在 → 補返本機有、雲端冇嘅嘢
  roomRef.get().then(s=>{
    if(curRoom !== room) return;
    const p = {rates:RATES};
    if(Object.keys(saved).length) p.tasks = saved;
    if(Object.keys(INF).length) p.inf = INF;
    const remote = s.exists ? s.data() : {};
    if(EXPS.length && !(remote.exps && remote.exps.length)) p.exps = EXPS;
    pushSync(p);
    // 雲端未有嘅嘢 → 用本機嗰份做種子
    if(!(remote.days && remote.dayOrder && remote.dayOrder.length)) pushDays();
    if(!remote.tasksDef && TASKSDEF.length || !remote.flights && FLIGHTS.length || !remote.hotels && HOTELS.length || !remote.backup && BACKUP.length){
      roomRef.set(JSON.parse(JSON.stringify({tasksDef:TASKSDEF, flights:FLIGHTS, hotels:HOTELS, backup:BACKUP})), {mergeFields:
        ["tasksDef","flights","hotels","backup"].filter(f=> !remote[f])
      }).catch(()=>{});
    }
    TASKSDEF.forEach(t=>{
      const img = localStorage.getItem(lsKey("att-"+t.id));
      if(img) attCol.doc(t.id).get().then(a=>{ if(!a.exists) attCol.doc(t.id).set({img}).catch(()=>{}); }).catch(()=>{});
    });
  }).catch(()=>{});
  tripUnsubs.push(roomRef.onSnapshot(snap=>{
    if(curRoom !== room) return;
    if(snap.exists) applyRemote(snap.data());
    setSyncStatus(`☁️ 同步中 · 房號 <b>${escT(room)}</b>`);
  }, err=>setSyncStatus("⚠️ 同步出錯:"+escT(err.code||err.message))));
  tripUnsubs.push(attCol.onSnapshot(snap=>{
    if(curRoom !== room) return;
    snap.docChanges().forEach(ch=>{
      const tid = ch.doc.id;
      if(ch.type === "removed"){ localStorage.removeItem(room+":att-"+tid); }
      else{
        const img = ch.doc.data().img;
        if(img){ try{ localStorage.setItem(room+":att-"+tid, img); }catch(e){} }
      }
      drawThumb(tid);
    });
  }, ()=>{}));
  // 旅程文件列表
  tripUnsubs.push(roomRef.collection("files").onSnapshot(snap=>{
    if(curRoom !== room) return;
    FILES = snap.docs.map(d=>Object.assign({id:d.id}, d.data())).sort((a,b)=>(a.t||0)-(b.t||0));
    renderFiles();
  }, ()=>{}));
}

function copyText(s){
  if(navigator.clipboard && navigator.clipboard.writeText) return navigator.clipboard.writeText(s).catch(()=>fallbackCopy(s));
  return Promise.resolve(fallbackCopy(s));
}
function fallbackCopy(s){
  const ta = document.createElement("textarea");
  ta.value = s; ta.style.position = "fixed"; ta.style.opacity = "0";
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand("copy"); }catch(e){}
  ta.remove();
}

// 驗證 + 清洗 AI 出嘅 JSON,轉做 app 內部格式
function importTripJSON(txt){
  txt = String(txt||"").trim();
  const a = txt.indexOf("{"), z = txt.lastIndexOf("}");
  if(a < 0 || z <= a) throw new Error("搵唔到 JSON — 要成段 {…} copy 晒過嚟");
  const j = JSON.parse(txt.slice(a, z+1));
  if(!j.name) throw new Error("JSON 入面冇 name");
  if(!Array.isArray(j.days) || !j.days.length) throw new Error("JSON 入面冇 days(至少要一日)");
  const usedIds = {};
  const days = j.days.map((d, idx)=>{
    const date = /^\d{4}-\d{2}-\d{2}$/.test(d.date) ? d.date : null;
    let id = date ? "d"+date.slice(5).replace("-","") : "dx"+(idx+1);
    while(usedIds[id] || ["tasks","map","exps","infos"].includes(id)) id += "x";
    usedIds[id] = 1;
    const nd = {
      id,
      date: date || "",
      tz: typeof d.tz === "string" && d.tz.indexOf("/") > 0 ? d.tz : "Asia/Hong_Kong",
      chip: date ? chipFromDate(date) : {w:"·", d:"D"+(idx+1)},
      title: String(d.title || ("Day "+(idx+1))),
      route: String(d.route || ""),
      tl: Array.isArray(d.tl) ? d.tl.filter(it=>it && it.x).map(it=>tidy({t:String(it.t||""), x:String(it.x), s:it.s?String(it.s):"", m:it.m?String(it.m):"", hl:it.hl?1:false})) : [],
      meals: Array.isArray(d.meals) ? d.meals.filter(m=>m && (m.v||m.b)).map(m=>{ const n = {k:String(m.k||"🍽"), b:String(m.b||""), v:String(m.v||"")}; if(m.m) n.m = String(m.m); return n; }) : [],
      costs: Array.isArray(d.costs) ? d.costs.map(String) : [],
      tips: Array.isArray(d.tips) ? d.tips.map(String) : [],
      links: Array.isArray(d.links) ? d.links.filter(L=>L && L.u).map(L=>({l:String(L.l||L.u), u:String(L.u), c:["cam","ticket","info","map"].indexOf(L.c)>=0 ? L.c : "info"})) : [],
    };
    if(d.badge && d.badge.t) nd.badge = {t:String(d.badge.t), c: d.badge.c === "bday" ? "bday" : "flight"};
    if(d.wx && d.wx.name && isFinite(d.wx.lat) && isFinite(d.wx.lon)) nd.wx = {name:String(d.wx.name), lat:+d.wx.lat, lon:+d.wx.lon};
    if(d.hotel && d.hotel.nm){ nd.hotel = {ic:String(d.hotel.ic||"🏨"), nm:String(d.hotel.nm), loc:String(d.hotel.loc||"")}; if(d.hotel.m) nd.hotel.m = String(d.hotel.m); }
    return nd;
  });
  const tasksDef = Array.isArray(j.tasks) ? j.tasks.filter(t=>t && t.x).map((t,i)=>{ const n = {id:"t"+Date.now().toString(36)+i, x:String(t.x)}; if(t.u){ n.u = String(t.u); n.ul = String(t.ul||"link"); } return n; }) : [];
  const flights = Array.isArray(j.flights) ? j.flights.filter(f=>f && (f.f||f.r)).map(f=>({f:String(f.f||"✈️"), r:String(f.r||""), d:String(f.d||"")})) : [];
  const hotels = Array.isArray(j.hotels) ? j.hotels.filter(x=>x && x.nm).map(x=>{ const n = {nm:String(x.nm), loc:String(x.loc||""), dt:String(x.dt||"")}; if(x.m) n.m = String(x.m); return n; }) : [];
  return {name:String(j.name), emoji:String(j.emoji||"✈️"), sub:String(j.sub||""), days, tasksDef, flights, hotels};
}

        const room = (v.room||"").trim();
        if(room.length < 8 || /[\/\s#?]/.test(room)){ alert("房號最少 8 個字,唔可以有空格或者 / # ? 符號"); return; }
        if(TRIPS.some(t=>t.room===room)){ alert("呢個旅程已經喺列表入面"); return; }
        const t = {room, emoji:v.emoji||"✈️", name:v.name||room, sub:v.sub||""};
        TRIPS.push(t);
        pushTripList(); renderHome();
        openTrip(t);
      },
    });
    return;
  }
  if(e.target.id === "trip-import"){ openImportSheet(); return; }
  const c = e.target.closest(".tripcard");
  if(c && TRIPS[+c.dataset.i]) openTrip(TRIPS[+c.dataset.i]);
});

// ---- boot:主頁先 ----
initFirebase();
renderHome();

// offline support
if("serviceWorker" in navigator && location.protocol.startsWith("http")){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
</script>
</body>
</html>
